# kube-prometheus-stack values

# Grafana configuration
grafana:
  enabled: true
  adminPassword: "admin"  # Change in production!
  
  # Expose via Ingress
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      external-dns.alpha.kubernetes.io/hostname: grafana.elojali-devops.com
    hosts:
      - grafana.elojali-devops.com
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.elojali-devops.com

# Prometheus configuration
prometheus:
  prometheusSpec:
    # How long to keep metrics
    retention: 7d
    
    # Resource limits
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

# Alertmanager - disable for now (future ticket)
alertmanager:
  enabled: false

# Node exporter - collects node metrics
nodeExporter:
  enabled: true

# kube-state-metrics - collects k8s object metrics
kubeStateMetrics:
  enabled: true