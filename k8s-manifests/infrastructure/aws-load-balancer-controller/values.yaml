# AWS Load Balancer Controller Helm Values
# Requires IAM role created by Terraform (IRSA)

clusterName: eks-cluster  # Will be updated after Terraform creates cluster

serviceAccount:
  create: true
  name: aws-load-balancer-controller
  annotations:
    # IAM role ARN - created by Terraform, update after cluster creation
    eks.amazonaws.com/role-arn: arn:aws:iam::367933905775:role/eks-cluster-aws-lb-controller

# Region where EKS cluster is deployed
region: us-east-1

# VPC ID - update after Terraform creates VPC
vpcId: vpc-0099f3b2d61cd40ee

# High availability - 2 replicas
replicaCount: 2

# Resource management
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Enable shield, waf, wafv2 (optional - for WAF integration)
enableShield: false
enableWaf: false
enableWafv2: false

# Pod disruption budget for HA
podDisruptionBudget:
  minAvailable: 1

# Logging
logLevel: info